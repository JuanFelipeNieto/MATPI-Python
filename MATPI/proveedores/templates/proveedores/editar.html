{% extends 'base.html' %}

{% block title %}Editar Proveedor — Matpi{% endblock %}


{% block content %}
<div class="formulario-seccion">
    <h1>Editar Proveedor</h1>

    <form method="POST" action="{% url 'editar_proveedor' %}">
        {% csrf_token %}
        <input type="hidden" name="txt_id" value="{{ proveedor.id }}">



        <div class="form-group">
            <label for="txt_nombre">Nombre del Proveedor</label>
            <input type="text" id="txt_nombre" name="txt_nombre" value="{{ proveedor.nombre_proveedor }}" required>
        </div>

        <div class="form-group">
            <label for="txt_direccion">Dirección</label>
            <input type="text" id="txt_direccion" name="txt_direccion" value="{{ proveedor.direccion|default:'' }}">
        </div>

        <div class="form-group">
            <label for="txt_correo">Correo Electrónico</label>
            <input type="email" id="txt_correo" name="txt_correo" value="{{ proveedor.correo_electronico|default:'' }}">
        </div>

        <div class="form-group">
            <label for="txt_telefono">Teléfono</label>
            <input type="text" id="txt_telefono" name="txt_telefono" value="{{ proveedor.telefono|default:'' }}">
        </div>



        <button type="submit" class="btn btn-guardar">Actualizar</button>
        <a href="{% url 'listar_proveedores' %}" class="btn btn-cancelar">Cancelar</a>
    </form>
</div>
{% endblock %}
