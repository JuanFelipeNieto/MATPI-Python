{% extends 'base.html' %}

{% block title %}Registrar Pedido — Matpi{% endblock %}

{% block content %}
<div class="formulario-seccion">
    <h1>Registrar Pedido</h1>

    <form method="POST" action="{% url 'registrar_pedido' %}">
        {% csrf_token %}



        <div class="form-group">
            <label for="txt_fecha">Fecha</label>
            <input type="date" id="txt_fecha" name="txt_fecha" required>
        </div>

        <div class="form-group">
            <label for="txt_numero_orden">Número de Orden</label>
            <input type="number" id="txt_numero_orden" name="txt_numero_orden" required>
        </div>

        <div class="form-group">
            <label for="txt_valor">Valor Total</label>
            <input type="number" id="txt_valor" name="txt_valor" placeholder="0" required>
        </div>

        <div class="form-group">
            <label for="txt_metodo_pago">Método de Pago</label>
            <select id="txt_metodo_pago" name="txt_metodo_pago" required>
                <option value="">— Seleccione —</option>
                <option value="Efectivo">Efectivo</option>
                <option value="Tarjeta Débito">Tarjeta Débito</option>
                <option value="Tarjeta Crédito">Tarjeta Crédito</option>
                <option value="Nequi">Nequi</option>
                <option value="Daviplata">Daviplata</option>
                <option value="PSE">PSE</option>
            </select>
        </div>

        <div class="form-group">
            <label for="txt_cliente">Cliente</label>
            <select id="txt_cliente" name="txt_cliente">
                <option value="">— Sin cliente —</option>
                {% for cliente in clientes %}
                <option value="{{ cliente.id }}">{{ cliente }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="txt_cajero">Cajero</label>
            <select id="txt_cajero" name="txt_cajero">
                <option value="">— Sin cajero —</option>
                {% for cajero in cajeros %}
                <option value="{{ cajero.usuario_id }}">{{ cajero }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="txt_reserva">Reserva (opcional)</label>
            <select id="txt_reserva" name="txt_reserva">
                <option value="">— Sin reserva —</option>
                {% for reserva in reservas %}
                <option value="{{ reserva.id }}">{{ reserva }}</option>
                {% endfor %}
            </select>
        </div>

        <button type="submit" class="btn btn-guardar">Guardar</button>
        <a href="{% url 'listar_pedidos' %}" class="btn btn-cancelar">Cancelar</a>
    </form>
</div>
{% endblock %}
