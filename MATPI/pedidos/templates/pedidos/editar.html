{% extends 'base.html' %}

{% block title %}Editar Pedido — Matpi{% endblock %}
{% block topbar_title %}Editar Pedido{% endblock %}

{% block content %}
<div class="formulario-seccion">
    <h1>Editar Pedido</h1>

    <form method="POST" action="{% url 'editar_pedido' %}">
        {% csrf_token %}
        <input type="hidden" name="txt_id" value="{{ pedido.id }}">

        <div class="form-group">
            <label>ID (automático)</label>
            <input type="text" value="#{{ pedido.id }}" disabled>
        </div>

        <div class="form-group">
            <label for="txt_fecha">Fecha</label>
            <input type="date" id="txt_fecha" name="txt_fecha" value="{{ pedido.fecha|date:'Y-m-d' }}" required>
        </div>

        <div class="form-group">
            <label for="txt_numero_orden">Número de Orden</label>
            <input type="number" id="txt_numero_orden" name="txt_numero_orden" value="{{ pedido.numero_orden }}"
                required>
        </div>

        <div class="form-group">
            <label for="txt_valor">Valor Total</label>
            <input type="number" id="txt_valor" name="txt_valor" value="{{ pedido.valor }}" min="0" required>
        </div>

        <div class="form-group">
            <label for="txt_metodo_pago">Método de Pago</label>
            <select id="txt_metodo_pago" name="txt_metodo_pago" required>
                <option value="Efectivo" {% if pedido.metodo_pago=='Efectivo' %}selected{% endif %}>Efectivo</option>
                <option value="Tarjeta Débito" {% if pedido.metodo_pago=='Tarjeta Débito' %}selected{% endif %}>Tarjeta
                    Débito</option>
                <option value="Tarjeta Crédito" {% if pedido.metodo_pago=='Tarjeta Crédito' %}selected{% endif %}>
                    Tarjeta Crédito</option>
                <option value="Nequi" {% if pedido.metodo_pago=='Nequi' %}selected{% endif %}>Nequi</option>
                <option value="Daviplata" {% if pedido.metodo_pago=='Daviplata' %}selected{% endif %}>Daviplata</option>
                <option value="PSE" {% if pedido.metodo_pago=='PSE' %}selected{% endif %}>PSE</option>
            </select>
        </div>

        <div class="form-group">
            <label for="txt_estado">Estado</label>
            <select id="txt_estado" name="txt_estado">
                <option value="1" {% if pedido.estado %}selected{% endif %}>Activo</option>
                <option value="0" {% if not pedido.estado %}selected{% endif %}>Completado</option>
            </select>
        </div>

        <div class="form-group">
            <label for="txt_cliente">Cliente</label>
            <select id="txt_cliente" name="txt_cliente">
                <option value="">— Sin cliente —</option>
                {% for cliente in clientes %}
                <option value="{{ cliente.id }}" {% if pedido.cliente_id==cliente.id %}selected{% endif %}>
                    {{ cliente }}
                </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="txt_cajero">Cajero</label>
            <select id="txt_cajero" name="txt_cajero">
                <option value="">— Sin cajero —</option>
                {% for cajero in cajeros %}
                <option value="{{ cajero.pk }}" {% if pedido.cajero_id==cajero.pk %}selected{% endif %}>
                    {{ cajero }}
                </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="txt_reserva">Reserva (opcional)</label>
            <select id="txt_reserva" name="txt_reserva">
                <option value="">— Sin reserva —</option>
                {% for reserva in reservas %}
                <option value="{{ reserva.id }}" {% if pedido.reserva_id==reserva.id %}selected{% endif %}>
                    {{ reserva }}
                </option>
                {% endfor %}
            </select>
        </div>

        <button type="submit" class="btn btn-guardar">Actualizar</button>
        <a href="{% url 'listar_pedidos' %}" class="btn btn-cancelar">Cancelar</a>
    </form>
</div>
{% endblock %}
