<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA DE COCINA — MATPI</title>
    <style>
        :root {
            --bg: #0d0d0d;
            --card-bg: #1a1a1a;
            --text: #ffffff;
            --primary: #ff9f00; /* Naranja MATPI */
            --primary-h: #e68a00;
            --accent: #ff4d4d;
            --success: #22c55e;
            --card-border: #333333;
        }
        body {
            margin: 0;
            padding: 20px;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--card-bg);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        h1 { margin: 0; color: var(--primary); font-size: 2.5rem; }
        #reloj { font-size: 2rem; font-weight: bold; }
        
        .grid-cocina {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }
        .order-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            border: 2px solid var(--card-border);
            border-top: 8px solid var(--primary);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s;
        }
        .order-header {
            display: flex;
            justify-content: space-between;
            border-bottom: 2px solid #2d2d2d;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        .order-num { font-size: 1.4rem; font-weight: 800; }
        .timer { font-size: 1.1rem; color: var(--accent); font-weight: bold; }
        
        .product-list { margin: 0; padding: 0; list-style: none; }
        .product-item {
            font-size: 1.2rem;
            margin-bottom: 10px;
            display: flex;
            align-items: flex-start;
        }
        .qty {
            background: var(--primary);
            color: var(--bg);
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 900;
            margin-right: 12px;
            min-width: 25px;
            text-align: center;
        }
        .notes {
            display: block;
            font-size: 1.1rem;
            color: #94a3b8;
            margin-top: 5px;
            font-style: italic;
        }
        .exclusions {
            color: #ef4444;
            font-weight: bold;
            font-size: 1.1rem;
            text-transform: uppercase;
        }

        /* Colores según tiempo */
        .order-card.delayed { border-top-color: var(--accent); animation: pulse 2s infinite; }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            70% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
    </style>
</head>
<body>
    <header>
        <h1>Pedidos pendientes</h1>
        <div id="reloj">00:00:00</div>
    </header>

    <div id="grid-container">
        {% include 'pedidos/cocina_fragment.html' %}
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            document.getElementById('reloj').innerText = now.toLocaleTimeString();

            document.querySelectorAll('.timer').forEach(el => {
                const start = new Date(el.getAttribute('data-inicio'));
                const diff = now - start;
                const min = Math.floor(diff / 60000);
                const sec = Math.floor((diff % 60000) / 1000);
                el.innerText = `${min}m ${sec}s`;

                // Resaltar si lleva más de 15 minutos
                if (min >= 15) {
                    el.closest('.order-card').classList.add('delayed');
                }
            });
        }

        // Sincronización en "Tiempo Real" usando AJAX cada 3 segundos
        function syncCocina() {
            fetch(window.location.href, {
                headers: { 'X-Requested-With': 'XMLHttpRequest' }
            })
            .then(res => res.text())
            .then(html => {
                document.getElementById('grid-container').innerHTML = html;
                updateClock(); // Recalcular cronómetros tras insertar nuevo HTML
            })
            .catch(err => console.error("Error sincronizando cocina:", err));
        }

        setInterval(syncCocina, 3000);
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
