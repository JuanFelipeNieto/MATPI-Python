{% extends "reportes/base_pdf.html" %}

{% block content %}
<table class="table-data">
    <thead>
        <tr>
            <th>ID / Documento</th>
            <th>Nombre Completo</th>
            <th>Correo Electrónico</th>
            <th class="text-right">Teléfono</th>
        </tr>
    </thead>
    <tbody>
        {% for u in datos %}
        <tr>
            <td>{{ u.id }}</td>
            <td>{{ u.nombre_completo }}</td>
            <td>{{ u.correo_electronico }}</td>
            <td class="text-right">{{ u.telefono }}</td>
        </tr>
        {% empty %}
        <tr><td colspan="4" class="text-center">No hay usuarios registrados.</td></tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
