{% extends 'base.html' %}

{% block title %}Editar Usuario — Matpi{% endblock %}
{% block topbar_title %}Editar Usuario{% endblock %}

{% block content %}
<div class="formulario-seccion">
    <h1>Editar Usuario</h1>

    <form method="POST" action="{% url 'editar_usuario' %}">
        {% csrf_token %}
        <input type="hidden" name="txt_id" value="{{ usuario.id }}">

        <div class="form-group">
            <label>Documento</label>
            <input type="text" value="{{ usuario.id }}" disabled>
        </div>

        <div class="form-group">
            <label for="txt_nombre">Nombre Completo</label>
            <input type="text" id="txt_nombre" name="txt_nombre" value="{{ usuario.nombre_completo }}" required>
        </div>

        <div class="form-group">
            <label for="txt_telefono">Teléfono</label>
            <input type="text" id="txt_telefono" name="txt_telefono" value="{{ usuario.telefono|default:'' }}" required>
        </div>

        <div class="form-group">
            <label for="txt_correo">Correo Electrónico</label>
            <input type="email" id="txt_correo" name="txt_correo" value="{{ usuario.correo_electronico }}" required>
        </div>

        <div class="form-group">
            <label for="txt_direccion">Dirección</label>
            <input type="text" id="txt_direccion" name="txt_direccion" value="{{ usuario.direccion|default:'' }}"
                required>
        </div>

        <div class="form-group">
            <label for="txt_fecha_nacimiento">Fecha de Nacimiento</label>
            <input type="date" id="txt_fecha_nacimiento" name="txt_fecha_nacimiento"
                value="{{ usuario.fecha_nacimiento|date:'Y-m-d' }}">
        </div>

        <div class="form-group">
            <label for="txt_fecha_ingreso">Fecha de Ingreso</label>
            <input type="date" id="txt_fecha_ingreso" name="txt_fecha_ingreso"
                value="{{ usuario.fecha_ingreso|date:'Y-m-d' }}">
        </div>

        <div class="form-group">
            <label for="txt_experiencia">Experiencia Laboral</label>
            <input type="text" id="txt_experiencia" name="txt_experiencia"
                value="{{ usuario.experiencia_laboral|default:'' }}">
        </div>

        <div class="form-group">
            <label for="txt_contrasena">Contraseña</label>
            <input type="password" id="txt_contrasena" name="txt_contrasena" placeholder="Dejar vacío para no cambiar">
        </div>

        <div class="form-group">
            <label for="txt_estado">Estado</label>
            <select id="txt_estado" name="txt_estado">
                <option value="Activo" {% if usuario.estado == "Activo" %}selected{% endif %}>
                    Activo
                </option>
                <option value="Vacaciones" {% if usuario.estado == "Vacaciones" %}selected{% endif %}>
                    Vacaciones
                </option>
                <option value="Inactivo" {% if usuario.estado == "Inactivo" %}selected{% endif %}>
                    Inactivo
                </option>
            </select>
        </div>

        <button type="submit" class="btn btn-guardar">Actualizar</button>
        <a href="{% url 'listar_usuarios' %}" class="btn btn-cancelar">Cancelar</a>
    </form>
</div>
{% endblock %}
