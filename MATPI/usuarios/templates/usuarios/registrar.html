{% extends 'base.html' %}

{% block title %}Registrar Usuario — Matpi{% endblock %}

{% block content %}
<div class="formulario-seccion">
    <h1>Registrar Usuario</h1>

    <form method="POST" action="{% url 'registrar_usuario' %}">
        {% csrf_token %}

        <div class="form-group">
            <label for="txt_id">Documento</label>
            <input type="text" id="txt_id" name="txt_id" placeholder="Número de documento" required>
        </div>

        <div class="form-group">
            <label for="txt_nombre">Nombre Completo</label>
            <input type="text" id="txt_nombre" name="txt_nombre" placeholder="Nombre completo" required>
        </div>

        <div class="form-group">
            <label for="txt_telefono">Teléfono</label>
            <input type="text" id="txt_telefono" name="txt_telefono" placeholder="Teléfono" required>
        </div>

        <div class="form-group">
            <label for="txt_correo">Correo Electrónico</label>
            <input type="email" id="txt_correo" name="txt_correo" placeholder="correo@ejemplo.com" required>
        </div>

        <div class="form-group">
            <label for="txt_contrasena">Contraseña</label>
            <input type="password" id="txt_contrasena" name="txt_contrasena" required>
        </div>

        <div class="form-group">
            <label for="txt_fecha_nacimiento">Fecha de Nacimiento</label>
            <input type="date" id="txt_fecha_nacimiento" name="txt_fecha_nacimiento" required>
        </div>

        <div class="form-group">
            <label for="txt_direccion">Dirección</label>
            <input type="text" id="txt_direccion" name="txt_direccion" placeholder="Dirección" required>
        </div>

        <div class="form-group">
            <label for="txt_fecha_ingreso">Fecha de Ingreso</label>
            <input type="date" id="txt_fecha_ingreso" name="txt_fecha_ingreso" required>
        </div>

        <div class="form-group">
            <label for="txt_experiencia">Experiencia Laboral</label>
            <input type="text" id="txt_experiencia" name="txt_experiencia" placeholder="Ej: 2 años">
        </div>

        <div class="form-group">
            <label for="txt_estado">Estado</label>
            <select id="txt_estado" name="txt_estado">
                <option value="Activo">Activo</option>
                <option value="Vacaciones">Vacaciones</option>
                <option value="Inactivo">Inactivo</option>
            </select>
        </div>

        <button type="submit" class="btn btn-guardar">Guardar</button>
        <a href="{% url 'listar_usuarios' %}" class="btn btn-cancelar">Cancelar</a>
    </form>
</div>
{% endblock %}
