{% extends 'base.html' %}

{% block title %}Editar Cliente — Matpi{% endblock %}


{% block content %}
<div class="formulario-seccion">
    <h1>Editar Cliente</h1>

    <form method="POST" action="{% url 'editar_cliente' %}">
        {% csrf_token %}
        <input type="hidden" name="txt_id" value="{{ cliente.id }}">

        <div class="form-group">
            <label>Número de Documento</label>
            <input type="text" value="{{ cliente.id }}" disabled>
        </div>

        <div class="form-group">
            <label for="txt_nombre">Nombre Completo</label>
            <input type="text" id="txt_nombre" name="txt_nombre" value="{{ cliente.nombre_completo }}" required>
        </div>

        <div class="form-group">
            <label for="txt_telefono">Teléfono</label>
            <input type="text" id="txt_telefono" name="txt_telefono" value="{{ cliente.telefono|default:'' }}" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
        </div>

        <div class="form-group">
            <label for="txt_direccion">Dirección</label>
            <input type="text" id="txt_direccion" name="txt_direccion" value="{{ cliente.direccion|default:'' }}" placeholder="Ingrese dirección residencial">
        </div>

        <div class="form-group">
            <label for="txt_localidad">Localidad (Bogotá)</label>
            <select id="txt_localidad" name="txt_localidad" class="form-control">
                <option value="">Seleccione una localidad</option>
                {% for loc in localidades %}
                    <option value="{{ loc }}" {% if cliente.localidad == loc %}selected{% endif %}>{{ loc }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="txt_cajero">Cajero</label>
            <select id="txt_cajero" name="txt_cajero">
                <option value="">— Sin cajero —</option>
                {% for cajero in cajeros %}
                <option value="{{ cajero.pk }}" {% if cliente.cajero_id == cajero.pk %}selected{% endif %}>
                    {{ cajero }}
                </option>
                {% endfor %}
            </select>
        </div>

        <button type="submit" class="btn btn-guardar">Actualizar</button>
        <a href="{% url 'listar_clientes' %}" class="btn btn-cancelar">Cancelar</a>
    </form>
</div>
{% endblock %}
