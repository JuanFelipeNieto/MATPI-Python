{% extends 'base.html' %}

{% block title %}Registrar Cliente — Matpi{% endblock %}

{% block content %}
<div class="formulario-seccion">
    <h1>Registrar Cliente</h1>

    <form method="POST" action="{% url 'registrar_cliente' %}">
        {% csrf_token %}

        <div class="form-group">
            <label for="txt_id">Número de Documento</label>
            <input type="number" id="txt_id" name="txt_id" placeholder="Ingrese documento" required>
        </div>

        <div class="form-group">
            <label for="txt_nombre">Nombre Completo</label>
            <input type="text" id="txt_nombre" name="txt_nombre" placeholder="Ingrese nombre completo" required>
        </div>

        <div class="form-group">
            <label for="txt_telefono">Teléfono</label>
            <input type="text" id="txt_telefono" name="txt_telefono" placeholder="Ingrese teléfono">
        </div>

        <button type="submit" class="btn btn-guardar">Guardar</button>
        <a href="{% url 'listar_clientes' %}" class="btn btn-cancelar">Cancelar</a>
    </form>
</div>
{% endblock %}
