{% extends 'base.html' %}

{% block title %}Registrar Cliente — Matpi{% endblock %}

{% block content %}
<div class="formulario-seccion">
    <h1>Registrar Cliente</h1>

    <form method="POST" action="{% url 'registrar_cliente' %}">
        {% csrf_token %}

        <div class="form-group">
            <label for="txt_id">Número de Documento</label>
            <input type="text" id="txt_id" name="txt_id" placeholder="Ingrese documento" required oninput="this.value = this.value.replace(/[^0-9]/g, '')">
        </div>

        <div class="form-group">
            <label for="txt_nombre">Nombre Completo</label>
            <input type="text" id="txt_nombre" name="txt_nombre" placeholder="Ingrese nombre completo" required>
        </div>

        <div class="form-group">
            <label for="txt_telefono">Teléfono</label>
            <input type="text" id="txt_telefono" name="txt_telefono" placeholder="Ingrese teléfono" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
        </div>

        <div class="form-group">
            <label for="txt_direccion">Dirección</label>
            <input type="text" id="txt_direccion" name="txt_direccion" placeholder="Ingrese dirección residencial">
        </div>

        <div class="form-group">
            <label for="txt_localidad">Localidad (Bogotá)</label>
            <select id="txt_localidad" name="txt_localidad" class="form-control">
                <option value="">Seleccione una localidad</option>
                {% for loc in localidades %}
                    <option value="{{ loc }}">{{ loc }}</option>
                {% endfor %}
            </select>
        </div>

        <button type="submit" class="btn btn-guardar">Guardar</button>
        <a href="{% url 'listar_clientes' %}" class="btn btn-cancelar">Cancelar</a>
    </form>
</div>
{% endblock %}
