{% extends 'base.html' %}

{% block title %}Registrar Reserva — Matpi{% endblock %}

{% block content %}
<div class="formulario-seccion">
    <h1>Registrar Reserva</h1>

    <form method="POST" action="{% url 'registrar_reserva' %}">
        {% csrf_token %}



        <div class="form-group">
            <label for="txt_fecha">Fecha y Hora</label>
            <input type="datetime-local" id="txt_fecha" name="txt_fecha" required>
        </div>

        <div class="form-group">
            <label for="txt_observaciones">Observaciones</label>
            <textarea id="txt_observaciones" name="txt_observaciones" rows="3" placeholder="Opcional"></textarea>
        </div>

        <div class="form-group">
            <label for="txt_cliente">Cliente (Escriba nombre o documento)</label>
            <input type="text" id="txt_cliente_search" list="clientes_list" name="txt_cliente_text" placeholder="Buscar cliente..." required autocomplete="off">
            <datalist id="clientes_list">
                {% for cliente in clientes %}
                <option value="{{ cliente.nombre_completo }} ({{ cliente.id }})">
                {% endfor %}
            </datalist>
        </div>
        <button type="submit" class="btn btn-guardar">Guardar</button>
        <a href="{% url 'listar_reservas' %}" class="btn btn-cancelar">Cancelar</a>
    </form>
</div>
{% endblock %}
