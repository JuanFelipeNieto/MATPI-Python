{% extends 'base.html' %}

{% block title %}Editar Factura — Matpi{% endblock %}

{% block content %}
<div class="formulario-seccion">
    <h1>Editar Factura</h1>

    <form method="POST" action="{% url 'editar_factura' %}">
        {% csrf_token %}
        <input type="hidden" name="txt_id" value="{{ factura.id }}">

        <div class="form-group">
            <label>ID de la Factura</label>
            <input type="number" value="{{ factura.id }}" disabled>
        </div>

        <div class="form-group">
            <label for="txt_valor_total">Valor Total</label>
            <input type="number" id="txt_valor_total" name="txt_valor_total" value="{{ factura.valor_total }}" required>
        </div>

        <div class="form-group">
            <label for="txt_iva">IVA (%)</label>
            <input type="number" step="0.01" id="txt_iva" name="txt_iva" value="{{ factura.iva|default:'' }}">
        </div>

        <div class="form-group">
            <label for="txt_descripcion">Descripción</label>
            <textarea id="txt_descripcion" name="txt_descripcion"
                rows="3">{{ factura.descripcion|default:'' }}</textarea>
        </div>

        <div class="form-group">
            <label for="txt_pedido">Pedido</label>
            <select id="txt_pedido" name="txt_pedido" required>
                {% for pedido in pedidos %}
                <option value="{{ pedido.id }}" {% if factura.pedido == pedido %}selected{% endif %}>{{ pedido }}</option>
                {% endfor %}
            </select>
        </div>

        <button type="submit" class="btn btn-guardar">Actualizar</button>
        <a href="{% url 'listar_facturas' %}" class="btn btn-cancelar">Cancelar</a>
    </form>
</div>
{% endblock %}
