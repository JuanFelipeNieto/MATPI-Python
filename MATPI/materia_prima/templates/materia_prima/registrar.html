{% extends 'base.html' %}

{% block title %}Registrar Materia Prima — Matpi{% endblock %}

{% block content %}
<div class="formulario-seccion">
    <h1>Registrar Materia Prima</h1>

    <form method="POST" action="{% url 'registrar_materia_prima' %}">
        {% csrf_token %}



        <div class="form-group">
            <label for="txt_nombre">Nombre</label>
            <input type="text" id="txt_nombre" name="txt_nombre" placeholder="Nombre de la materia prima" required>
        </div>

        <div class="form-group">
            <label for="txt_unidad">Unidad de Medida</label>
            <input type="text" id="txt_unidad" name="txt_unidad" placeholder="Ej: kg, litros, unidades">
        </div>

        <div class="form-group">
            <label for="txt_cantidad">Cantidad</label>
            <input type="number" id="txt_cantidad" name="txt_cantidad" value="0">
        </div>

        <div class="form-group">
            <label for="txt_fecha_ingreso">Fecha de Ingreso</label>
            <input type="datetime-local" id="txt_fecha_ingreso" name="txt_fecha_ingreso" value="{{ fecha_actual|date:'Y-m-d\TH:i' }}">
        </div>

        <div class="form-group">
            <label for="txt_fecha_vencimiento">Fecha de Vencimiento</label>
            <input type="date" id="txt_fecha_vencimiento" name="txt_fecha_vencimiento">
        </div>

        <button type="submit" class="btn btn-guardar">Guardar</button>
        <a href="{% url 'listar_materia_prima' %}" class="btn btn-cancelar">Cancelar</a>
    </form>
</div>
{% endblock %}
