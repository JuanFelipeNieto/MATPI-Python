{% extends 'base.html' %}

{% block title %}Editar Materia Prima — Matpi{% endblock %}
{% block topbar_title %}Editar Materia Prima{% endblock %}

{% block content %}
<div class="formulario-seccion">
    <h1>Editar Materia Prima</h1>

    <form method="POST" action="{% url 'editar_materia_prima' %}">
        {% csrf_token %}
        <input type="hidden" name="txt_id" value="{{ materia_prima.id }}">

        <div class="form-group">
            <label>ID (automático)</label>
            <input type="text" value="#{{ materia_prima.id }}" disabled>
        </div>

        <div class="form-group">
            <label for="txt_nombre">Nombre</label>
            <input type="text" id="txt_nombre" name="txt_nombre" value="{{ materia_prima.nombre_materia_prima }}"
                required>
        </div>

        <div class="form-group">
            <label for="txt_unidad">Unidad de Medida</label>
            <input type="text" id="txt_unidad" name="txt_unidad" value="{{ materia_prima.unidad_medida|default:'' }}"
                placeholder="Ej: kg, litros, unidades">
        </div>

        <div class="form-group">
            <label for="txt_cantidad">Cantidad</label>
            <input type="number" id="txt_cantidad" name="txt_cantidad" value="{{ materia_prima.cantidad }}" min="0">
        </div>

        <div class="form-group">
            <label for="txt_fecha_ingreso">Fecha de Ingreso</label>
            <input type="datetime-local" id="txt_fecha_ingreso" name="txt_fecha_ingreso"
                value="{{ materia_prima.fecha_ingreso|date:'Y-m-d' }}T{{ materia_prima.fecha_ingreso|time:'H:i' }}">
        </div>

        <div class="form-group">
            <label for="txt_fecha_vencimiento">Fecha de Vencimiento</label>
            <input type="date" id="txt_fecha_vencimiento" name="txt_fecha_vencimiento"
                value="{{ materia_prima.fecha_vencimiento|date:'Y-m-d'|default:'' }}">
        </div>

        <button type="submit" class="btn btn-guardar">Actualizar</button>
        <a href="{% url 'listar_materia_prima' %}" class="btn btn-cancelar">Cancelar</a>
    </form>
</div>
{% endblock %}
