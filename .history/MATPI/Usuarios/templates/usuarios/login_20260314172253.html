{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio Sesión | Matpi</title>
    <meta name="description" content="Descubre las mejores hamburguesas de Matpi. Calidad y sabor garantizado.">
    <link rel="icon" href="{% static 'img/Favicon.png' %}" />
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: url("{% static 'img/Fondo.jpeg' %}") no-repeat center center fixed;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            background-size: cover;
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            padding: 20px;
            text-align: center;
        }

        header img {
            max-width: 150px;
            height: auto;
            border-radius: 8px;
        }

        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        section {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            margin-bottom: 20px;
        }

        .logo img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid #ff6600;
            padding: 5px;
            background: #fff;
        }

        h2 {
            color: #ff6600;
            margin-bottom: 25px;
            font-weight: 700;
            font-size: 1.8rem;
        }

        .campo {
            text-align: left;
            margin-bottom: 20px;
        }

        .campo label {
            display: block;
            font-size: 0.9rem;
            color: #555;
            margin-bottom: 8px;
            font-weight: 600;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 1rem;
            background: #fff;
            color: #333;
            transition: all 0.3s;
        }

        input:focus {
            border-color: #ff6600;
            box-shadow: 0 0 0 3px rgba(255, 102, 0, 0.15);
            outline: none;
        }

        .input-group {
            position: relative;
            width: 100%;
        }

        .input-group .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 1.2rem;
            color: #666;
            background: transparent;
            border: none;
            outline: none;
        }

        .boton button {
            width: 100%;
            background-color: #ff6600;
            color: #fff;
            padding: 14px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: bold;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .boton button:hover {
            background-color: #e65500;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(230, 85, 0, 0.3);
        }

        .error-msg {
            background-color: #fee2e2;
            color: #dc2626;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            border: 1px solid #fecaca;
            text-align: left;
        }

        footer {
            background-color: #000;
            color: #fff;
            text-align: center;
            padding: 30px 20px;
            margin-top: 40px;
        }

        footer p {
            margin-bottom: 15px;
            font-size: 0.9rem;
            color: #aaa;
        }

        .footer-links {
            list-style: none;
            padding: 0;
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
        }

        .footer-links a {
            color: #ccc;
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.3s;
        }

        .footer-links a:hover {
            color: #ff6600;
        }
    </style>
</head>
<body>

    <header>
        <img src="{% static 'img/Matpi.png' %}" alt="Logo Matpi" />
    </header>

    <main>
        <section>
            <div class="logo">
                <img src="{% static 'img/Logomatpi.png' %}" alt="Logo Circular" />
            </div>
            <h2>Bienvenido</h2>

            {% if error %}
                <div class="error-msg">
                    ⚠️ {{ error }}
                </div>
            {% endif %}

            <form method="POST" action="{% url 'login' %}">
                {% csrf_token %}
                
                <div class="campo">
                    <label for="txt_id">Usuario (Documento)</label>
                    <input type="text" id="txt_id" name="txt_id" placeholder="Ingresa tu número de documento" required autofocus>
                </div>

                <div class="campo">
                    <label for="txt_contrasena">Contraseña</label>
                    <div class="input-group">
                        <input type="password" id="txt_contrasena" name="txt_contrasena" placeholder="Ingresa tu contraseña" required>
                        <button type="button" class="toggle-password" onclick="togglePassword('txt_contrasena', this)">👁️</button>
                    </div>
                </div>

                <div class="boton">
                    <button type="submit">Ingresar</button>
                </div>
            </form>
        </section>
    </main>

    <footer>
        <p>© 2025 Matpi. Todos los derechos reservados.</p>
        <ul class="footer-links">
            <li><a href="#">Política de privacidad</a></li>
            <li><a href="#">Términos de uso</a></li>
        </ul>
    </footer>

    <script>
        function togglePassword(id, btn) {
            const input = document.getElementById(id);
            if (input.type === "password") {
                input.type = "text";
                btn.textContent = "🙈";
            } else {
                input.type = "password";
                btn.textContent = "👁️";
            }
        }
    </script>

</body>
</html>
