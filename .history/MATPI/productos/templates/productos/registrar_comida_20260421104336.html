{% extends 'base.html' %}

{% block title %}Registrar Comida — Matpi{% endblock %}

{% block content %}
<div class="formulario-seccion">
    <h1>Registrar Comida</h1>

    <form method="POST" action="{% url 'registrar_producto' %}" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="form-group">
            <label for="txt_nombre">Nombre del Producto</label>
            <input type="text" id="txt_nombre" name="txt_nombre" placeholder="Nombre de la comida" required>
        </div>

        <div class="form-group">
            <label>Ingredientes (Composición)</label>
            <div class="table-container">
                <table class="table" id="tabla-composicion">
                    <thead>
                        <tr>
                            <th style="width: 35%;">Materia Prima</th>
                            <th style="width: 20%;">Equiv. (Unidad Base)</th>
                            <th style="width: 30%;">Cantidad Total Usada</th>
                            <th style="width: 15%;">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="body-composicion">
                        <tr class="fila-materia">
                            <td>
                                <select name="materia_id[]" class="form-control select-materia" required onchange="actualizarEquivalencia(this)">
                                    <option value="" data-equiv="" data-unidad="">— Seleccione —</option>
                                    {% for materia in materias_primas %}
                                        <option value="{{ materia.id }}" data-equiv="{{ materia.cantidad_por_unidad }}" data-unidad="{{ materia.unidad_medida }}">{{ materia.nombre_materia_prima }}</option>
                                    {% endfor %}
                                </select>
                            </td>
                            <td>
                                <div style="display: flex; align-items: center; gap: 5px;">
                                    <input type="text" class="form-control input-equiv-base" readonly placeholder="-" style="background-color: #f8f9fa; text-align: center;">
                                    <span class="unit-label"></span>
                                </div>
                            </td>
                            <td>
                                <div class="input-group" style="display: flex; gap: 5px; align-items: center;">
                                    <button type="button" class="btn btn-outline-secondary btn-restar" onclick="restarUnidad(this)" title="Restar 1 unidad" style="padding: 2px 8px;">-</button>
                                    <input type="number" name="materia_cantidad[]" class="form-control input-equiv" value="" min="0.01" step="0.01" required oninput="actualizarUnidades(this)" placeholder="0" style="text-align: center;">
                                    <button type="button" class="btn btn-outline-secondary btn-sumar" onclick="sumarUnidad(this)" title="Sumar 1 unidad" style="padding: 2px 8px;">+</button>
                                    <input type="hidden" name="materia_unidad[]" class="input-unidad-texto" value="">
                                    <span class="unit-label"></span>
                                </div>
                                <small class="msg-unidades text-success" style="display: block; margin-top: 5px; font-weight: bold;"></small>
                            </td>
                            <td>
                                <button type="button" class="btn btn-cancelar btn-sm" onclick="eliminarFila(this)">Eliminar</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <button type="button" class="btn btn-azul btn-sm" onclick="agregarFila()" style="margin-top: 10px;">+ Agregar Ingrediente</button>
        </div>

        <div class="form-group">
            <label for="txt_precio">Precio de Venta</label>
            <input type="number" id="txt_precio" name="txt_precio" placeholder="Ingrese precio" required>
        </div>

        <div class="form-group">
            <label for="txt_categoria">Categoría</label>
            <select id="txt_categoria" name="txt_categoria" required>
                <option value="">— Seleccione —</option>
                <option value="Hamburguesas">Hamburguesas</option>
                <option value="Perros Calientes">Perros Calientes</option>
                <option value="Entradas y Snacks">Entradas y Snacks</option>
                <option value="Combos">Combos</option>
                <option value="Postres">Postres</option>
                <option value="Adiciones">Adiciones</option>
                <option value="Salchipapas">Salchipapas</option>
            </select>
        </div>

        <div class="form-group">
            <label for="txt_imagen">Imagen del Producto</label>
            <input type="file" id="txt_imagen" name="txt_imagen" accept="image/*">
        </div>

        <button type="submit" class="btn btn-guardar">Guardar Comida</button>
        <a href="{% url 'listar_productos' %}" class="btn btn-cancelar">Cancelar</a>
    </form>
</div>

<script>
    function agregarFila() {
        const tbody = document.getElementById('body-composicion');
        const filas = tbody.getElementsByClassName('fila-materia');
        const nuevaFila = filas[0].cloneNode(true);
        const select = nuevaFila.querySelector('select');
        const inputEquivBase = nuevaFila.querySelector('.input-equiv-base');
        const inputEquiv = nuevaFila.querySelector('.input-equiv');
        const inputUnidadOculto = nuevaFila.querySelector('.input-unidad-texto');
        const unitLabels = nuevaFila.querySelectorAll('.unit-label');
        const msgUnidades = nuevaFila.querySelector('.msg-unidades');
        
        if(select) select.value = "";
        if(inputEquivBase) inputEquivBase.value = "-";
        if(inputEquiv) inputEquiv.value = "";
        if(inputUnidadOculto) inputUnidadOculto.value = "";
        if(unitLabels) unitLabels.forEach(l => l.textContent = "");
        if(msgUnidades) msgUnidades.textContent = "";
        
        tbody.appendChild(nuevaFila);
    }
    function eliminarFila(boton) {
        const tbody = document.getElementById('body-composicion');
        if (tbody.rows.length > 1) {
            boton.closest('tr').remove();
        } else {
            alert("La comida debe tener al menos un ingrediente.");
        }
    }
    
    function actualizarEquivalencia(selectObj) {
        const tr = selectObj.closest('tr');
        const opcion = selectObj.options[selectObj.selectedIndex];
        
        const equiv = parseFloat(opcion.getAttribute('data-equiv')) || 0;
        const unidad = opcion.getAttribute('data-unidad') || '';
        
        const inputBase = tr.querySelector('.input-equiv-base');
        const inputCantidad = tr.querySelector('.input-equiv');
        const inputUnidadOculto = tr.querySelector('.input-unidad-texto');
        const labelsUnidad = tr.querySelectorAll('.unit-label');
        
        if (equiv > 0) {
            inputBase.value = equiv;
            inputCantidad.value = equiv;
            inputUnidadOculto.value = unidad;
            labelsUnidad.forEach(label => label.textContent = unidad);
            actualizarUnidades(inputCantidad);
        } else {
            inputBase.value = "-";
            inputCantidad.value = "";
            inputUnidadOculto.value = "";
            labelsUnidad.forEach(label => label.textContent = "");
            tr.querySelector('.msg-unidades').textContent = "";
        }
    }
    
    function actualizarUnidades(inputObj) {
        const tr = inputObj.closest('tr');
        const select = tr.querySelector('.select-materia');
        const opcion = select.options[select.selectedIndex];
        if (!opcion || !opcion.value) return;

        const equivBase = parseFloat(opcion.getAttribute('data-equiv')) || 1;
        const cantidadActual = parseFloat(inputObj.value) || 0;
        const numUnidades = (cantidadActual / equivBase).toFixed(2);
        const floatUnidades = parseFloat(numUnidades);
        
        const msg = tr.querySelector('.msg-unidades');
        if (equivBase > 0 && cantidadActual > 0) {
            if (floatUnidades > 1) {
                msg.textContent = "⚠ Equivale a: " + floatUnidades + " unidad(es)";
                msg.style.color = "#e67e22"; // Naranja fuerte
                msg.classList.remove('text-success');
            } else {
                msg.textContent = "✔ Equivale a: " + floatUnidades + " unidad(es)";
                msg.style.color = "";
                msg.classList.add('text-success');
            }
        } else {
            msg.textContent = "";
        }
    }
    
    function sumarUnidad(btn) {
        const tr = btn.closest('tr');
        const inputObj = tr.querySelector('.input-equiv');
        const select = tr.querySelector('.select-materia');
        const opcion = select.options[select.selectedIndex];
        const equivBase = parseFloat(opcion.getAttribute('data-equiv')) || 0;
        
        if (equivBase > 0) {
            let actual = parseFloat(inputObj.value) || 0;
            inputObj.value = (actual + equivBase).toFixed(2);
            actualizarUnidades(inputObj);
        }
    }
    
    function restarUnidad(btn) {
        const tr = btn.closest('tr');
        const inputObj = tr.querySelector('.input-equiv');
        const select = tr.querySelector('.select-materia');
        const opcion = select.options[select.selectedIndex];
        const equivBase = parseFloat(opcion.getAttribute('data-equiv')) || 0;
        
        if (equivBase > 0) {
            let actual = parseFloat(inputObj.value) || 0;
            let nuevo = actual - equivBase;
            if (nuevo < 1) { nuevo = 1; } 
            inputObj.value = nuevo.toFixed(2);
            actualizarUnidades(inputObj);
        }
    }
</script>
{% endblock %}
